name: Cooldown Auto Post

on:
  workflow_dispatch: # 스케줄 제거 — cron-job.org로 전환 (2026-06-17)

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Bubble create_cooldown_post
        run: |
          curl -s -X POST "${{ secrets.BUBBLE_API_URL }}" \
            -H "Authorization: Bearer ${{ secrets.BUBBLE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{}'
          echo "게시 완료 $(date '+%Y-%m-%d %H:%M KST')"
